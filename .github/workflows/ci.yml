name: CI/CD Pipeline
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/django-notes-app .
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/django-notes-app

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/"
          target: "/home/ubuntu/app"
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app

            if [ ! -f .env ]; then
              echo "DB_ENGINE=mysql" > .env
              echo "DB_NAME=test_db" >> .env
              echo "DB_USER=root" >> .env
              echo "DB_PASSWORD=root" >> .env
              echo "DB_PORT=3306" >> .env
              echo "DB_HOST=db" >> .env
            fi

            docker pull ${{ secrets.DOCKER_USERNAME }}/django-notes-app
            docker compose up -d --remove-orphans
